<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image View</title>
</head>
<body>
    {% for img in images %}
    <p>{{ img.title }}</p>
    <img src="{{ img.get_presigned_url }}" width="300"/>
    {% endfor %}
</body>
</html>
